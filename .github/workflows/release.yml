name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ─── Detect changed paths ───────────────────────────────────────
  detect:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      rust_changed: ${{ steps.detect.outputs.rust_changed }}
      ts_changed: ${{ steps.detect.outputs.ts_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: detect
        run: |
          changed_files=$(git diff --name-only HEAD~1 HEAD)
          rust_changed=false
          ts_changed=false
          if echo "$changed_files" | grep -q '^rust/'; then
            rust_changed=true
          fi
          ts_files=$(echo "$changed_files" | grep -v '^rust/' || true)
          if [ -n "$ts_files" ]; then
            ts_changed=true
          fi
          echo "rust_changed=${rust_changed}" >> "$GITHUB_OUTPUT"
          echo "ts_changed=${ts_changed}" >> "$GITHUB_OUTPUT"
          echo "Detected: rust_changed=${rust_changed}, ts_changed=${ts_changed}"

  # ─── Rust CI ─────────────────────────────────────────────────────
  rust-ci:
    name: rust ci (clippy, test, build)
    needs: detect
    if: needs.detect.outputs.rust_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"
          components: clippy

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> rust/target"

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Build
        run: cargo build --release --workspace --locked

  # ─── TypeScript CI ──────────────────────────────────────────────
  ts-ci:
    name: typescript ci (build, lint, test)
    needs: detect
    if: needs.detect.outputs.ts_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test -- --reporter=default --reporter=junit --outputFile=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-release-ts
          path: "**/test-results/junit.xml"
          if-no-files-found: warn

      - name: Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Node.js Tests (release)
          path: "**/test-results/junit.xml"
          reporter: java-junit
          fail-on-error: false

      # ─── Rust version bump detection ─────────────────────────────────
  rust-version:
    name: detect rust version bump
    needs: [detect, rust-ci]
    if: needs.detect.outputs.rust_changed == 'true' && needs.rust-ci.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      bumped: ${{ steps.version.outputs.bumped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Sync versions from package.json
        working-directory: rust
        run: node scripts/sync-version.mjs

      - name: Detect version bump
        id: version
        working-directory: rust
        run: |
          version=$(node -p "require('./package.json').version")
          bumped=false

          # Compare local Cargo.toml version against what's published on crates.io
          # If a crate is not yet published OR local version differs → bumped
          for toml in crates/*/Cargo.toml Cargo.toml; do
            name=$(grep '^name = ' "$toml" | head -1 | sed 's/name = "\(.*\)"/\1/')
            local_ver=$(grep '^version = ' "$toml" | head -1 | sed 's/version = "\(.*\)"/\1/')
            if [ -z "$name" ] || [ -z "$local_ver" ]; then
              continue
            fi
            # Skip workspace root (no name/version pair)
            if [ "$name" = "" ]; then
              continue
            fi
            published_ver=$(cargo info "${name}@${local_ver}" 2>/dev/null | grep "^${name} v" | sed "s/^${name} v\([^ ]*\).*/\1/" || echo "")
            if [ "$published_ver" != "$local_ver" ]; then
              echo "Version bump: ${name} published=${published_ver:-none} local=${local_ver}"
              bumped=true
            fi
          done

          # Also check npm: cpd package version
          npm_published=$(npm info cpd version 2>/dev/null || echo "")
          if [ "$npm_published" != "$version" ]; then
            echo "npm version bump: cpd published=${npm_published:-none} local=${version}"
            bumped=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "bumped=$bumped" >> "$GITHUB_OUTPUT"

  # ─── TypeScript version bump detection ───────────────────────────
  ts-version:
    name: detect typescript version bump
    needs: [detect, ts-ci]
    if: needs.detect.outputs.ts_changed == 'true' && needs.ts-ci.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      bumped: ${{ steps.version.outputs.bumped }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Detect version bump
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          bumped=false

          # Check root package.json against npm
          npm_published=$(npm info jscpd version 2>/dev/null || echo "")
          if [ "$npm_published" != "$version" ]; then
            echo "Version bump: jscpd published=${npm_published:-none} local=${version}"
            bumped=true
          fi

          # Check apps/*/package.json against npm
          for pkg in apps/*/package.json; do
            name=$(node -p "require('./$pkg').name")
            local_ver=$(node -p "require('./$pkg').version")
            npm_published=$(npm info "$name" version 2>/dev/null || echo "")
            if [ "$npm_published" != "$local_ver" ]; then
              echo "Version bump: $name published=${npm_published:-none} local=${local_ver}"
              bumped=true
            fi
          done

          # Check packages/*/package.json (skip private packages)
          for pkg in packages/*/package.json; do
            is_private=$(node -p "require('./$pkg').private || false" 2>/dev/null || echo "true")
            if [ "$is_private" = "true" ]; then
              continue
            fi
            name=$(node -p "require('./$pkg').name")
            local_ver=$(node -p "require('./$pkg').version")
            npm_published=$(npm info "$name" version 2>/dev/null || echo "")
            if [ "$npm_published" != "$local_ver" ]; then
              echo "Version bump: $name published=${npm_published:-none} local=${local_ver}"
              bumped=true
            fi
          done

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "bumped=$bumped" >> "$GITHUB_OUTPUT"

  # ─── Rust publish ────────────────────────────────────────────────
  rust-publish-crates:
    name: publish crates.io packages
    needs: rust-version
    if: needs.rust-version.outputs.bumped == 'true'
    uses: ./.github/workflows/crates-publish.yml
    with:
      version: ${{ needs.rust-version.outputs.version }}
    secrets: inherit
    permissions:
      contents: read
      id-token: write
      checks: write

  rust-publish-npm:
    name: publish npm rust packages
    needs: rust-version
    if: needs.rust-version.outputs.bumped == 'true'
    uses: ./.github/workflows/npm-rust-publish.yml
    with:
      version: ${{ needs.rust-version.outputs.version }}
    secrets: inherit
    permissions:
      contents: read
      id-token: write
      checks: write

  # ─── TypeScript publish ──────────────────────────────────────────
  ts-publish:
    name: publish npm packages
    needs: ts-version
    if: needs.ts-version.outputs.bumped == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Publish packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish-packages

  # ─── GitHub releases ─────────────────────────────────────────────
  rust-release:
    name: create rust github release
    needs: [rust-version, rust-publish-crates, rust-publish-npm]
    if: needs.rust-version.outputs.bumped == 'true' && needs.rust-publish-crates.result == 'success' && needs.rust-publish-npm.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract release notes
        id: notes
        working-directory: rust
        run: |
          version="${{ needs.rust-version.outputs.version }}"
          escaped=$(echo "$version" | sed 's/\./\\./g')
          notes=""
          if [ -f CHANGELOG.md ]; then
            notes=$(awk "BEGIN{found=0} /^## .*${escaped}/{found=1; next} /^## /{if(found) exit} /^---$/{if(found) exit} found{print}" CHANGELOG.md)
          fi
          if [ -z "$notes" ]; then
            notes="Release v${version}"
          fi
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.rust-version.outputs.version }}"
          tag="v${version}"
          gh release create "${tag}" \
            --title "Release v${version}" \
            --notes "${{ steps.notes.outputs.notes }}"

  ts-release:
    name: create typescript github release
    needs: [ts-version, ts-publish]
    if: needs.ts-version.outputs.bumped == 'true' && needs.ts-publish.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Extract release notes
        id: notes
        run: |
          version="${{ needs.ts-version.outputs.version }}"
          escaped=$(echo "$version" | sed 's/\./\\./g')
          notes=$(awk "BEGIN{found=0} /^## .*${escaped}/{found=1; next} /^## /{if(found) exit} /^---$/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="Release v${version}"
          fi
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.ts-version.outputs.version }}"
          tag="v${version}"
          gh release create "${tag}" \
            --title "Release v${version}" \
            --notes "${{ steps.notes.outputs.notes }}"