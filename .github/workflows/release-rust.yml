name: Release Rust

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

defaults:
  run:
    shell: bash

jobs:
  version:
    name: read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Read version from package.json
        id: version
        working-directory: rust
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          else
            version=$(node -p "require('./package.json').version")
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  crates-publish:
    needs: version
    uses: ./.github/workflows/crates-publish.yml
    with:
      version: ${{ needs.version.outputs.version }}
    secrets: inherit

  npm-rust-publish:
    needs: version
    uses: ./.github/workflows/npm-rust-publish.yml
    with:
      version: ${{ needs.version.outputs.version }}
    secrets: inherit

  create-release:
    name: create GitHub release
    needs:
      - version
      - crates-publish
      - npm-rust-publish
    if: ${{ always() && needs.crates-publish.result != 'failure' && needs.npm-rust-publish.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ needs.version.outputs.version }}"
          tag="cpd-v${version}"

          notes="Rust-based cpd (jscpd) release v${version}

          ## Platform Packages
          Install via npm:
          \`\`\`bash
          npm install -g cpd
          \`\`\`

          ## Install via Cargo
          \`\`\`bash
          cargo install jscpd
          \`\`\`

          The binary command is \`cpd\`."

          # Extract release notes from rust/CHANGELOG.md if available
          if [ -f rust/CHANGELOG.md ]; then
            escaped=$(echo "$version" | sed 's/\./\\./g')
            changelog_notes=$(awk "BEGIN{found=0} /^## .*${escaped}/{found=1; next} /^## /{if(found) exit} /^---$/{if(found) exit} found{print}" rust/CHANGELOG.md)
            if [ -n "$changelog_notes" ]; then
              notes="${changelog_notes}"
            fi
          fi

          gh release create "${tag}" \
            --title "cpd v${version}" \
            --notes "${notes}"