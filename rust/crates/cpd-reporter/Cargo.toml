[package]
name = "cpd-reporter"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
cpd-core = { version = "0.1.0", path = "../cpd-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
quick-xml = { version = "0.36", features = ["serialize"] }
csv = "1"
askama = "0.12"
thiserror = "2"
